<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - ShopZone</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <i class="fas fa-store"></i> ShopZone
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link"><i class="fas fa-home"></i> Home</a>
        <a href="/cart.html" class="nav-link cart-link">
          <i class="fas fa-shopping-cart"></i> Cart
          <span class="cart-count" id="cartCount">0</span>
        </a>
        <div id="authLinks">
          <a href="/login.html" class="nav-link">Login</a>
        </div>
        <div id="userLinks" style="display:none;">
          <span class="nav-link user-name" id="userName"></span>
          <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <section class="orders-section">
    <div class="container">
      <h1 class="page-title"><i class="fas fa-box"></i> My Orders</h1>
      <div id="ordersList">
        <!-- Loaded by JavaScript -->
      </div>
      <div class="loading" id="loading">
        <i class="fas fa-spinner fa-spin"></i> Loading orders...
      </div>
      <div class="empty-cart" id="noOrders" style="display:none;">
        <i class="fas fa-box-open"></i>
        <h2>No orders yet</h2>
        <p>You haven't placed any orders. Start shopping!</p>
        <a href="/" class="btn btn-primary">Browse Products</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 ShopZone. Built for CodeAlpha Internship.</p>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/orders.js"></script>
</body>
</html>
