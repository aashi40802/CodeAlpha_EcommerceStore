<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ShopZone</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <i class="fas fa-store"></i> ShopZone
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link"><i class="fas fa-home"></i> Home</a>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-card">
      <h1><i class="fas fa-sign-in-alt"></i> Login</h1>
      <p class="auth-subtitle">Welcome back! Sign in to your account.</p>
      <div id="loginError" class="error-msg" style="display:none;"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      <button class="btn btn-primary btn-block" id="loginBtn">Login</button>
      <p class="auth-footer">
        Don't have an account? <a href="/register.html">Sign Up</a>
      </p>
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script src="/js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/';
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginError');

      if (!email || !password) {
        errorDiv.textContent = 'Please fill in all fields';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorDiv.textContent = data.message;
          errorDiv.style.display = 'block';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('Login successful!', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } catch (err) {
        errorDiv.textContent = 'Something went wrong. Try again.';
        errorDiv.style.display = 'block';
      }
    });

    // Allow Enter key to submit
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
