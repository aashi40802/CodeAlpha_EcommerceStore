<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - ShopZone</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <i class="fas fa-store"></i> ShopZone
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link"><i class="fas fa-home"></i> Home</a>
        <div id="authLinks">
          <a href="/login.html" class="nav-link">Login</a>
          <a href="/register.html" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
        <div id="userLinks" style="display:none;">
          <a href="/orders.html" class="nav-link"><i class="fas fa-box"></i> Orders</a>
          <span class="nav-link user-name" id="userName"></span>
          <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <section class="cart-section">
    <div class="container">
      <h1 class="page-title"><i class="fas fa-shopping-cart"></i> Shopping Cart</h1>

      <div class="cart-layout">
        <!-- Cart Items -->
        <div class="cart-items" id="cartItems">
          <!-- Loaded by JavaScript -->
        </div>

        <!-- Cart Summary -->
        <div class="cart-summary" id="cartSummary" style="display:none;">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Items (<span id="summaryCount">0</span>)</span>
            <span>₹<span id="summarySubtotal">0</span></span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span class="free-shipping">FREE</span>
          </div>
          <hr>
          <div class="summary-row total">
            <span>Total</span>
            <span>₹<span id="summaryTotal">0</span></span>
          </div>
          <button class="btn btn-primary btn-block" id="checkoutBtn">
            Proceed to Checkout
          </button>
        </div>
      </div>

      <!-- Empty Cart -->
      <div class="empty-cart" id="emptyCart" style="display:none;">
        <i class="fas fa-shopping-cart"></i>
        <h2>Your cart is empty</h2>
        <p>Looks like you haven't added anything to your cart yet.</p>
        <a href="/" class="btn btn-primary">Start Shopping</a>
      </div>

      <!-- Checkout Modal -->
      <div class="modal-overlay" id="checkoutModal" style="display:none;">
        <div class="modal">
          <div class="modal-header">
            <h2>Checkout</h2>
            <button class="modal-close" id="closeModal">&times;</button>
          </div>
          <div class="modal-body">
            <h3>Shipping Address</h3>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="shipName" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
              <label>Address</label>
              <input type="text" id="shipAddress" placeholder="Enter street address" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>City</label>
                <input type="text" id="shipCity" placeholder="City" required>
              </div>
              <div class="form-group">
                <label>Postal Code</label>
                <input type="text" id="shipPostal" placeholder="PIN Code" required>
              </div>
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" id="shipPhone" placeholder="Enter phone number" required>
            </div>
            <div class="order-total-display">
              <span>Order Total:</span>
              <span>₹<span id="modalTotal">0</span></span>
            </div>
            <button class="btn btn-primary btn-block" id="placeOrderBtn">
              <i class="fas fa-check"></i> Place Order
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 ShopZone. Built for CodeAlpha Internship.</p>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
