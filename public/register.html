<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ShopZone</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <i class="fas fa-store"></i> ShopZone
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link"><i class="fas fa-home"></i> Home</a>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-card">
      <h1><i class="fas fa-user-plus"></i> Sign Up</h1>
      <p class="auth-subtitle">Create your ShopZone account.</p>
      <div id="registerError" class="error-msg" style="display:none;"></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Enter your full name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Minimum 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="regConfirmPassword" placeholder="Confirm your password">
      </div>
      <button class="btn btn-primary btn-block" id="registerBtn">Create Account</button>
      <p class="auth-footer">
        Already have an account? <a href="/login.html">Login</a>
      </p>
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script src="/js/auth.js"></script>
  <script>
    if (localStorage.getItem('token')) {
      window.location.href = '/';
    }

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      const errorDiv = document.getElementById('registerError');

      if (!name || !email || !password || !confirmPassword) {
        errorDiv.textContent = 'Please fill in all fields';
        errorDiv.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorDiv.textContent = 'Password must be at least 6 characters';
        errorDiv.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorDiv.textContent = data.message;
          errorDiv.style.display = 'block';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('Account created successfully!', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } catch (err) {
        errorDiv.textContent = 'Something went wrong. Try again.';
        errorDiv.style.display = 'block';
      }
    });

    document.getElementById('regConfirmPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('registerBtn').click();
    });
  </script>
</body>
</html>
