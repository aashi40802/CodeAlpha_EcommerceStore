<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - ShopZone</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <i class="fas fa-store"></i> ShopZone
      </a>
      <div class="nav-links">
        <a href="/cart.html" class="nav-link cart-link">
          <i class="fas fa-shopping-cart"></i> Cart
          <span class="cart-count" id="cartCount">0</span>
        </a>
        <div id="authLinks">
          <a href="/login.html" class="nav-link">Login</a>
          <a href="/register.html" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
        <div id="userLinks" style="display:none;">
          <a href="/orders.html" class="nav-link"><i class="fas fa-box"></i> Orders</a>
          <span class="nav-link user-name" id="userName"></span>
          <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Product Detail -->
  <section class="product-detail-section">
    <div class="container">
      <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Products</a>
      <div class="product-detail" id="productDetail">
        <!-- Loaded by JavaScript -->
      </div>
      <div class="loading" id="loading">
        <i class="fas fa-spinner fa-spin"></i> Loading product...
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 ShopZone. Built for CodeAlpha Internship.</p>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/product.js"></script>
</body>
</html>
